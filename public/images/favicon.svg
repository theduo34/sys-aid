<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Rounded badge background — dark navy works on both light and dark browser themes -->
  <rect width="64" height="64" rx="14" fill="#0F172A"/>
  <!-- Headband arc -->
  <path d="M 18 38 A 14 14 0 0 1 46 38" fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Left earcup -->
  <rect x="14" y="36" width="9" height="14" rx="3" fill="#FFFFFF"/>
  <!-- Right earcup -->
  <rect x="41" y="36" width="9" height="14" rx="3" fill="#FFFFFF"/>
  <!-- Mic boom -->
  <path d="M 45.5 50 Q 45.5 56 39 57" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Accent dot -->
  <circle cx="39" cy="57" r="3" fill="#4F8AF7"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 96" role="img" aria-label="SysAid Help Desk">
  <title>SysAid Help Desk</title>
  <!-- Headset glyph: uses currentColor so it inherits text color (works on any bg) -->
  <g fill="currentColor">
    <!-- Headband arc -->
    <path d="M 14 56 A 34 34 0 0 1 82 56" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
    <!-- Left earcup -->
    <rect x="6" y="54" width="18" height="26" rx="6"/>
    <!-- Right earcup -->
    <rect x="72" y="54" width="18" height="26" rx="6"/>
    <!-- Mic boom -->
    <path d="M 81 80 Q 81 94 67 96" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- Accent dot at end of mic boom (always blue — the universal accent) -->
  <circle cx="67" cy="96" r="5" fill="#4F8AF7"/>

  <!-- Wordmark -->
  <text x="110" y="60" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="26" font-weight="600" fill="currentColor" letter-spacing="-0.5">SysAid</text>
  <text x="110" y="80" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="10" fill="currentColor" opacity="0.6" letter-spacing="2.5">HELP DESK</text>
</svg>
